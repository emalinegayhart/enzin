[package]
name = "enzin"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "enzin"
path = "src/main.rs"

[lib]
name = "enzin"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tantivy = "0.22"
zstd = "0.13"
tempfile = "3.8"
chrono = { version = "0.4", features = ["serde"] }
